# 发布到 GreasyFork 的 GitHub Actions 工作流
# 
# 配置步骤:
# 1. 在 GitHub 仓库 Settings -> Secrets and variables -> Actions 中添加:
#    - GREASYFORK_API_KEY: 你的 GreasyFork API 密钥
#    - GREASYFORK_SCRIPT_ID: 你的脚本 ID
# 2. 可选: 修改触发条件 (如添加标签触发)

name: Publish to GreasyFork

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'package.json'
  workflow_dispatch:  # 手动触发

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to GreasyFork
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          GREASYFORK_API_KEY: ${{ secrets.GREASYFORK_API_KEY }}
          GREASYFORK_SCRIPT_ID: ${{ secrets.GREASYFORK_SCRIPT_ID }}
        run: npm run publish:greasyfork
